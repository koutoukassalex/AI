<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-elevated: #27272a;
            --accent: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #8b5cf6, #d946ef);
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --border: rgba(255, 255, 255, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            padding: calc(1rem + var(--safe-top)) 1.25rem 1rem;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .brand-name {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.3s ease;
        }

        .status-dot.online {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }

        /* --- Main View --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scroll-behavior: smooth;
        }

        /* --- Messages --- */
        .msg {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            align-self: flex-end;
        }

        .msg.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.85rem 1.1rem;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .msg.user .bubble {
            background: var(--accent-gradient);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg.ai .bubble {
            background: var(--surface);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .msg-info {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
            margin-bottom: 0.2rem;
        }

        .msg.user .msg-info {
            text-align: right;
        }

        /* --- Input Area --- */
        .input-container {
            padding: 0.75rem 1rem calc(1rem + var(--safe-bottom));
            background: rgba(9, 9, 11, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
        }

        .input-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            display: flex;
            align-items: flex-end;
            padding: 0.4rem 0.5rem 0.4rem 1.25rem;
            gap: 0.5rem;
            transition: border-color 0.2s ease;
        }

        .input-row:focus-within {
            border-color: var(--accent);
        }

        #msgInput {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            padding: 0.6rem 0;
            max-height: 120px;
            resize: none;
            outline: none;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .send-btn {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3);
        }

        /* --- Bottom Nav --- */
        .bottom-nav {
            display: flex;
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding-bottom: var(--safe-bottom);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.75rem 0;
            color: var(--text-muted);
            font-size: 0.7rem;
            gap: 0.25rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 1.4rem;
        }

        /* --- Bottom Sheet --- */
        .bottom-sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface-elevated);
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            padding: 1.5rem 1.5rem calc(2rem + var(--safe-bottom));
            z-index: 1001;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .bottom-sheet.active {
            transform: translateY(0);
        }

        .bottom-sheet-overlay.active {
            display: block;
            opacity: 1;
        }

        .handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: -0.5rem auto 1.5rem;
        }

        /* --- Auth Overlay --- */
        #authOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 1rem;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            margin-bottom: 1rem;
            font-size: 1rem;
            outline: none;
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 14px;
            background: var(--accent-gradient);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        /* --- Welcome View --- */
        .welcome {
            text-align: center;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .welcome h2 {
            font-size: 1.75rem;
            font-weight: 800;
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .chip {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            border-radius: 16px;
            font-size: 0.9rem;
            color: var(--text);
            cursor: pointer;
        }

        /* --- Themes --- */
        html[data-theme="nordic"] {
            --bg: #f3f4f6;
            --surface: #ffffff;
            --surface-elevated: #f9fafb;
            --accent: #3b82f6;
            --text: #111827;
            --text-muted: #6b7280;
            --border: rgba(0, 0, 0, 0.1);
            --accent-gradient: linear-gradient(135deg, #3b82f6, #0ea5e9);
        }

        html[data-theme="midnight"] {
            --bg: #0d0f17;
            --surface: #1a1c2e;
            --surface-elevated: #252844;
            --accent: #7c6af7;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        html[data-theme="cyberpunk"] {
            --bg: #0a0310;
            --surface: #1a0b2e;
            --surface-elevated: #2d124d;
            --accent: #ec4899;
            --text: #06b6d4;
            --text-muted: #9d4edd;
            --border: rgba(236, 72, 153, 0.2);
            --accent-gradient: linear-gradient(135deg, #ec4899, #ec4899);
        }

        html[data-theme="forest"] {
            --bg: #061e14;
            --surface: #0a2e21;
            --surface-elevated: #0f402e;
            --accent: #10b981;
            --text: #ecfdf5;
            --text-muted: #6ee7b7;
            --border: rgba(16, 185, 129, 0.2);
            --accent-gradient: linear-gradient(135deg, #10b981, #059669);
        }

        html[data-theme="sunset"] {
            --bg: #1e0c1b;
            --surface: #2d1226;
            --surface-elevated: #3d1b34;
            --accent: #f43f5e;
            --text: #fff1f2;
            --text-muted: #fb7185;
            --border: rgba(244, 63, 94, 0.2);
            --accent-gradient: linear-gradient(135deg, #f43f5e, #fb923c);
        }

        html[data-theme="sakura"] {
            --bg: #fff5f7;
            --surface: #fee2e2;
            --surface-elevated: #fecaca;
            --accent: #f472b6;
            --text: #450a0a;
            --text-muted: #991b1b;
            --border: rgba(244, 114, 182, 0.2);
        }

        html[data-theme="ocean"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-elevated: #334155;
            --accent: #38bdf8;
            --text: #f0f9ff;
            --text-muted: #7dd3fc;
            --border: rgba(56, 189, 248, 0.2);
        }

        html[data-theme="aurora"] {
            --bg: #030712;
            --surface: #111827;
            --surface-elevated: #1f2937;
            --accent: #22c55e;
            --text: #f0fdf4;
            --text-muted: #86efac;
            --border: rgba(34, 197, 94, 0.2);
            --accent-gradient: linear-gradient(135deg, #22c55e, #a855f7);
        }

        html[data-theme="obsidian"] {
            --bg: #000000;
            --surface: #111111;
            --surface-elevated: #222222;
            --accent: #d4af37;
            --text: #f8fafc;
            --text-muted: #a1a1aa;
            --border: rgba(212, 175, 55, 0.2);
        }

        html[data-theme="dracula"] {
            --bg: #282a36;
            --surface: #44475a;
            --surface-elevated: #6272a4;
            --accent: #bd93f9;
            --text: #f8f8f2;
            --text-muted: #ff79c6;
            --border: rgba(189, 147, 249, 0.2);
        }

        html[data-theme="abyss"] {
            --bg: #000c18;
            --surface: #001529;
            --surface-elevated: #002140;
            --accent: #0070e0;
            --text: #e6f7ff;
            --text-muted: #91d5ff;
            --border: rgba(0, 112, 224, 0.2);
        }

        html[data-theme="matrix"] {
            --bg: #000000;
            --surface: #0a0a0a;
            --surface-elevated: #1a1a1a;
            --accent: #00fb00;
            --text: #00fb00;
            --text-muted: #008f11;
            --border: rgba(0, 251, 0, 0.2);
        }

        html[data-theme="gold"] {
            --bg: #1c1917;
            --surface: #292524;
            --surface-elevated: #44403c;
            --accent: #eab308;
            --text: #fefce8;
            --text-muted: #fde047;
            --border: rgba(234, 179, 8, 0.2);
        }

        html[data-theme="ghost"] {
            --bg: #101010;
            --surface: #1a1a1a;
            --surface-elevated: #262626;
            --accent: #e5e5e5;
            --text: #fafafa;
            --text-muted: #a3a3a3;
            --border: rgba(255, 255, 255, 0.05);
        }

        html[data-theme="neon"] {
            --bg: #050505;
            --surface: #121212;
            --surface-elevated: #1e1e1e;
            --accent: #bf00ff;
            --text: #39ff14;
            --text-muted: #bf00ff;
            --border: rgba(191, 0, 255, 0.3);
        }

        html[data-theme="rose"] {
            --bg: #4c0519;
            --surface: #881337;
            --surface-elevated: #9f1239;
            --accent: #fb7185;
            --text: #fff1f2;
            --text-muted: #fda4af;
            --border: rgba(251, 113, 133, 0.2);
        }

        html[data-theme="slate"] {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-elevated: #334155;
            --accent: #94a3b8;
            --text: #f8fafc;
            --text-muted: #cbd5e1;
            --border: rgba(148, 163, 184, 0.2);
        }

        html[data-theme="copper"] {
            --bg: #2d1a12;
            --surface: #452b1f;
            --surface-elevated: #5d3d2c;
            --accent: #d97706;
            --text: #fff7ed;
            --text-muted: #fbbf24;
            --border: rgba(217, 119, 6, 0.2);
        }

        html[data-theme="coffee"] {
            --bg: #1c1917;
            --surface: #292524;
            --surface-elevated: #44403c;
            --accent: #78350f;
            --text: #fafaf9;
            --text-muted: #a8a29e;
            --border: rgba(120, 53, 15, 0.2);
        }

        html[data-theme="royal"] {
            --bg: #1e1b4b;
            --surface: #312e81;
            --surface-elevated: #3730a3;
            --accent: #818cf8;
            --text: #eef2ff;
            --text-muted: #a5b4fc;
            --border: rgba(129, 140, 248, 0.2);
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .theme-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .theme-card:active {
            transform: scale(0.95);
        }

        .theme-card.active {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .theme-preview {
            height: 40px;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            display: flex;
            overflow: hidden;
        }

        .theme-color {
            flex: 1;
        }

        .theme-name {
            font-size: 0.85rem;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <!-- Auth -->
    <div id="authOverlay">
        <div class="auth-card">
            <div class="welcome-icon">🔐</div>
            <h2 style="margin-bottom: 1.5rem;">Secure Access</h2>
            <input type="password" id="authPass" class="auth-input" placeholder="Enter Password (1976)">
            <button class="auth-btn" id="loginBtn">Unlock AI</button>
            <p id="authError" style="color: #ef4444; font-size: 0.85rem; margin-top: 1rem; display: none;">Invalid
                credentials</p>
        </div>
    </div>

    <header>
        <div class="brand">
            <div class="brand-logo">🤖</div>
            <div class="brand-name">AI Mobile</div>
        </div>
        <div class="status-dot" id="statusDot"></div>
    </header>

    <main id="chatArea">
        <div class="welcome" id="welcomeView">
            <div class="welcome-icon">✨</div>
            <h2>What's on your mind?</h2>
            <p>I'm your private local AI powered by Ollama.</p>
            <div class="chip-container">
                <div class="chip" onclick="sendPrompt('Tell me a fun fact')">Tell me a fun fact</div>
                <div class="chip" onclick="sendPrompt('Write a short story')">Write a short story</div>
                <div class="chip" onclick="sendPrompt('How can you help me?')">How can you help me?</div>
            </div>
        </div>
    </main>

    <div class="input-container">
        <div class="input-row">
            <textarea id="msgInput" placeholder="Type a message..." rows="1"></textarea>
            <button class="action-btn send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('chat')">
            <span class="nav-icon">💬</span>
            <span>Chat</span>
        </div>
        <div class="nav-item" onclick="switchTab('themes')">
            <span class="nav-icon">🎨</span>
            <span>Themes</span>
        </div>
        <div class="nav-item" onclick="switchTab('history')">
            <span class="nav-icon">📜</span>
            <span>History</span>
        </div>
        <div class="nav-item" onclick="showSettings()">
            <span class="nav-icon">⚙️</span>
            <span>Settings</span>
        </div>
    </nav>

    <!-- Settings Bottom Sheet -->
    <div class="bottom-sheet-overlay" id="sheetOverlay"></div>
    <div class="bottom-sheet" id="settingsSheet">
        <div class="handle"></div>
        <h3 style="margin-bottom: 1.5rem;">Settings</h3>

        <div style="display: flex; flex-direction: column; gap: 1.25rem;">
            <div>
                <label
                    style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">Ollama
                    Server URL</label>
                <input type="text" id="ollamaUrl" class="auth-input" style="margin-bottom:0">
            </div>

            <div>
                <label
                    style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">Model
                    Select</label>
                <select id="modelSelect" class="auth-input" style="margin-bottom:0">
                    <option value="llama3">llama3</option>
                    <option value="mistral">mistral</option>
                    <option value="llava">llava</option>
                </select>
            </div>

            <button class="auth-btn" onclick="saveSettings()" style="margin-top: 1rem;">Save Changes</button>
            <button class="auth-btn" onclick="logout()" style="background: #ef4444; margin-top: 0.5rem;">Logout</button>
        </div>
    </div>

    <!-- History Bottom Sheet -->
    <div class="bottom-sheet" id="historySheet">
        <div class="handle"></div>
        <h3 style="margin-bottom: 1.5rem;">Chat History</h3>
        <div id="historyList" style="display: flex; flex-direction: column; gap: 0.75rem;">
            <!-- History items will be injected here -->
        </div>
    </div>

    <!-- Themes Bottom Sheet -->
    <div class="bottom-sheet" id="themesSheet">
        <div class="handle"></div>
        <h3 style="margin-bottom: 1.5rem;">Themes</h3>
        <div class="theme-grid" id="themesList">
            <!-- Themes will be injected here -->
        </div>
    </div>

    <script>
        // --- Core Essentials ---
        const OLLAMA_URL_KEY = 'ollama_url';
        const STORAGE_KEY = 'localai_sessions';
        const AUTH_KEY = 'localai_authenticated';
        const LAST_MODEL_KEY = 'localai_last_model';
        const THEME_KEY = 'localai_theme';
        const DEFAULT_URL = 'https://09vq1p80-11434.uks1.devtunnels.ms';

        let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let activeId = null;
        let history = [];

        const themes = [
            { id: 'default', name: 'Midnight (Default)', colors: ['#09090b', '#8b5cf6', '#fafafa'] },
            { id: 'nordic', name: 'Nordic Light', colors: ['#f3f4f6', '#3b82f6', '#111827'] },
            { id: 'midnight', name: 'Midnight Dark', colors: ['#0d0f17', '#7c6af7', '#f8fafc'] },
            { id: 'cyberpunk', name: 'Cyberpunk', colors: ['#0a0310', '#ec4899', '#06b6d4'] },
            { id: 'forest', name: 'Emerald Forest', colors: ['#061e14', '#10b981', '#ecfdf5'] },
            { id: 'sunset', name: 'Sunset Glow', colors: ['#1e0c1b', '#f43f5e', '#fff1f2'] },
            { id: 'sakura', name: 'Sakura', colors: ['#fff5f7', '#f472b6', '#450a0a'] },
            { id: 'ocean', name: 'Ocean', colors: ['#0f172a', '#38bdf8', '#f0f9ff'] },
            { id: 'aurora', name: 'Aurora', colors: ['#030712', '#22c55e', '#f0fdf4'] },
            { id: 'obsidian', name: 'Obsidian Gold', colors: ['#000000', '#d4af37', '#f8fafc'] },
            { id: 'dracula', name: 'Dracula', colors: ['#282a36', '#bd93f9', '#f8f8f2'] },
            { id: 'abyss', name: 'Abyss', colors: ['#000c18', '#0070e0', '#e6f7ff'] },
            { id: 'matrix', name: 'The Matrix', colors: ['#000000', '#00fb00', '#00fb00'] },
            { id: 'gold', name: 'Golden Hour', colors: ['#1c1917', '#eab308', '#fefce8'] },
            { id: 'ghost', name: 'Ghost Minimal', colors: ['#101010', '#e5e5e5', '#fafafa'] },
            { id: 'neon', name: 'Neon City', colors: ['#050505', '#bf00ff', '#39ff14'] },
            { id: 'rose', name: 'Rose Petal', colors: ['#4c0519', '#fb7185', '#fff1f2'] },
            { id: 'slate', name: 'Slate Gray', colors: ['#0f172a', '#94a3b8', '#f8fafc'] },
            { id: 'copper', name: 'Copper', colors: ['#2d1a12', '#d97706', '#fff7ed'] },
            { id: 'coffee', name: 'Coffee', colors: ['#1c1917', '#78350f', '#fafaf9'] },
            { id: 'royal', name: 'Royal Purple', colors: ['#1e1b4b', '#818cf8', '#eef2ff'] }
        ];

        // --- Themes ---
        function renderThemes() {
            const list = document.getElementById('themesList');
            const currentTheme = localStorage.getItem(THEME_KEY) || 'default';
            list.innerHTML = themes.map(t => `
                <div class="theme-card ${t.id === currentTheme ? 'active' : ''}" onclick="setTheme('${t.id}')">
                    <div class="theme-preview">
                        ${t.colors.map(c => `<div class="theme-color" style="background: ${c}"></div>`).join('')}
                    </div>
                    <div class="theme-name">${t.name}</div>
                </div>
            `).join('');
        }

        function setTheme(themeId) {
            if (themeId === 'default') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', themeId);
            }
            localStorage.setItem(THEME_KEY, themeId);
            renderThemes();
        }

        // --- Auth ---
        function checkAuth() {
            if (sessionStorage.getItem(AUTH_KEY)) {
                document.getElementById('authOverlay').style.display = 'none';
            }
        }

        document.getElementById('loginBtn').onclick = () => {
            const pass = document.getElementById('authPass').value;
            if (pass === '1976') {
                sessionStorage.setItem(AUTH_KEY, 'true');
                checkAuth();
            } else {
                document.getElementById('authError').style.display = 'block';
            }
        };

        function logout() {
            sessionStorage.removeItem(AUTH_KEY);
            location.reload();
        }

        // --- Settings ---
        function showSettings() {
            document.getElementById('sheetOverlay').classList.add('active');
            document.getElementById('settingsSheet').classList.add('active');
            document.getElementById('ollamaUrl').value = localStorage.getItem(OLLAMA_URL_KEY) || DEFAULT_URL;
        }

        function saveSettings() {
            localStorage.setItem(OLLAMA_URL_KEY, document.getElementById('ollamaUrl').value);
            closeSheets();
            checkConnection();
        }

        function closeSheets() {
            document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
            document.getElementById('sheetOverlay').classList.remove('active');
        }

        document.getElementById('sheetOverlay').onclick = closeSheets;

        // --- Chat Logic ---
        async function checkConnection() {
            const url = localStorage.getItem(OLLAMA_URL_KEY) || DEFAULT_URL;
            const dot = document.getElementById('statusDot');
            const modelSelect = document.getElementById('modelSelect');
            try {
                const res = await fetch(`${url}/api/tags`);
                if (res.ok) {
                    dot.className = 'status-dot online';
                    const data = await res.json();
                    if (data.models && data.models.length > 0) {
                        const current = modelSelect.value;
                        const lastGlobal = localStorage.getItem(LAST_MODEL_KEY);
                        modelSelect.innerHTML = '';
                        data.models.forEach(m => {
                            const opt = document.createElement('option');
                            opt.value = m.name;
                            opt.textContent = m.name;
                            if (m.name === current || m.name === lastGlobal) opt.selected = true;
                            modelSelect.appendChild(opt);
                        });
                    }
                } else {
                    dot.className = 'status-dot';
                }
            } catch {
                dot.className = 'status-dot';
            }
        }

        const msgInput = document.getElementById('msgInput');
        const chatArea = document.getElementById('chatArea');
        const modelSelect = document.getElementById('modelSelect');

        modelSelect.onchange = () => {
            localStorage.setItem(LAST_MODEL_KEY, modelSelect.value);
        };

        msgInput.oninput = () => {
            msgInput.style.height = 'auto';
            msgInput.style.height = msgInput.scrollHeight + 'px';
        };

        function addMessage(role, text) {
            const welcome = document.getElementById('welcomeView');
            if (welcome) welcome.style.display = 'none';
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${role}`;
            msgDiv.innerHTML = `
                <div class="bubble">${marked.parse(text)}</div>
                <div class="msg-info">${role === 'user' ? 'You' : 'AI'} • ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
            `;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            hljs.highlightAll();
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;

            msgInput.value = '';
            msgInput.style.height = 'auto';
            addMessage('user', text);
            history.push({ role: 'user', content: text });

            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'msg ai';
            aiMsgDiv.innerHTML = '<div class="bubble">...</div>';
            chatArea.appendChild(aiMsgDiv);
            const bubble = aiMsgDiv.querySelector('.bubble');

            const url = localStorage.getItem(OLLAMA_URL_KEY) || DEFAULT_URL;
            try {
                const response = await fetch(`${url}/api/chat`, {
                    method: 'POST',
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: history,
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                let fullText = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = new TextDecoder().decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (!line) continue;
                        const json = JSON.parse(line);
                        if (json.message) {
                            fullText += json.message.content;
                            bubble.innerHTML = marked.parse(fullText);
                        }
                    }
                }
                history.push({ role: 'assistant', content: fullText });
                saveCurrentSession();
            } catch (e) {
                bubble.innerHTML = 'Error connecting to Ollama';
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;

        function sendPrompt(text) {
            msgInput.value = text;
            sendMessage();
        }

        function saveCurrentSession() {
            if (!activeId) activeId = Date.now().toString();
            const session = sessions.find(s => s.id === activeId);
            if (session) {
                session.messages = history;
            } else {
                sessions.unshift({
                    id: activeId,
                    name: history[0].content.substring(0, 30),
                    messages: history
                });
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if (tab === 'chat') {
                document.querySelector('.nav-item').classList.add('active');
                closeSheets();
            } else if (tab === 'themes') {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                renderThemes();
                document.getElementById('sheetOverlay').classList.add('active');
                document.getElementById('themesSheet').classList.add('active');
            } else if (tab === 'history') {
                document.querySelectorAll('.nav-item')[2].classList.add('active');
                renderHistory();
                document.getElementById('sheetOverlay').classList.add('active');
                document.getElementById('historySheet').classList.add('active');
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = sessions.map(s => `
                <div class="chip" style="width:100%; text-align:left; justify-content: flex-start;" onclick="loadSession('${s.id}')">
                    <div style="font-weight:600">${s.name}</div>
                    <div style="font-size:0.7rem; color:var(--text-muted)">${s.messages.length} messages</div>
                </div>
            `).join('');
        }

        function loadSession(id) {
            const session = sessions.find(s => s.id === id);
            if (!session) return;
            activeId = id;
            history = session.messages;
            chatArea.innerHTML = '';
            const welcome = document.getElementById('welcomeView');
            if (welcome) welcome.style.display = 'none';
            history.forEach(m => addMessage(m.role === 'assistant' ? 'ai' : 'user', m.content));
            closeSheets();
            switchTab('chat');
        }

        // --- Init ---
        function init() {
            checkAuth();
            checkConnection();
            setInterval(checkConnection, 10000);

            // Theme init
            const savedTheme = localStorage.getItem(THEME_KEY);
            if (savedTheme) setTheme(savedTheme);

            // Auto-load most recent session if exists
            if (sessions.length > 0) {
                loadSession(sessions[0].id);
            }
        }

        init();
    </script>
</body>

</html>
