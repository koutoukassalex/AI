<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI Mobile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #09090b;
            --surface: #18181b;
            --surface-elevated: #27272a;
            --accent: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #8b5cf6, #d946ef);
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --border: rgba(255, 255, 255, 0.1);
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            padding: calc(1rem + var(--safe-top)) 1.25rem 1rem;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .brand-name {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            transition: background 0.3s ease;
        }

        .status-dot.online {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e;
        }

        /* --- Main View --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            scroll-behavior: smooth;
        }

        /* --- Messages --- */
        .msg {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.user {
            align-self: flex-end;
        }

        .msg.ai {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.85rem 1.1rem;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .msg.user .bubble {
            background: var(--accent-gradient);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg.ai .bubble {
            background: var(--surface);
            color: var(--text);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .msg-info {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
            margin-bottom: 0.2rem;
        }

        .msg.user .msg-info {
            text-align: right;
        }

        /* --- Input Area --- */
        .input-container {
            padding: 0.75rem 1rem calc(1rem + var(--safe-bottom));
            background: rgba(9, 9, 11, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
        }

        .input-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            display: flex;
            align-items: flex-end;
            padding: 0.4rem 0.5rem 0.4rem 1.25rem;
            gap: 0.5rem;
            transition: border-color 0.2s ease;
        }

        .input-row:focus-within {
            border-color: var(--accent);
        }

        #msgInput {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            padding: 0.6rem 0;
            max-height: 120px;
            resize: none;
            outline: none;
        }

        .action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .send-btn {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3);
        }

        /* --- Bottom Nav --- */
        .bottom-nav {
            display: flex;
            background: var(--bg);
            border-top: 1px solid var(--border);
            padding-bottom: var(--safe-bottom);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.75rem 0;
            color: var(--text-muted);
            font-size: 0.7rem;
            gap: 0.25rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 1.4rem;
        }

        /* --- Bottom Sheet --- */
        .bottom-sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface-elevated);
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            padding: 1.5rem 1.5rem calc(2rem + var(--safe-bottom));
            z-index: 1001;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        .bottom-sheet.active {
            transform: translateY(0);
        }

        .bottom-sheet-overlay.active {
            display: block;
            opacity: 1;
        }

        .handle {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: -0.5rem auto 1.5rem;
        }

        /* --- Auth Overlay --- */
        #authOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 1rem;
            border-radius: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            margin-bottom: 1rem;
            font-size: 1rem;
            outline: none;
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 14px;
            background: var(--accent-gradient);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }

        /* --- Welcome View --- */
        .welcome {
            text-align: center;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .welcome-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .welcome h2 {
            font-size: 1.75rem;
            font-weight: 800;
        }

        .welcome p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .chip {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.75rem 1.25rem;
            border-radius: 16px;
            font-size: 0.9rem;
            color: var(--text);
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Auth -->
    <div id="authOverlay">
        <div class="auth-card">
            <div class="welcome-icon">🔐</div>
            <h2 style="margin-bottom: 1.5rem;">Secure Access</h2>
            <input type="password" id="authPass" class="auth-input" placeholder="Enter Password (1976)">
            <button class="auth-btn" id="loginBtn">Unlock AI</button>
            <p id="authError" style="color: #ef4444; font-size: 0.85rem; margin-top: 1rem; display: none;">Invalid
                credentials</p>
        </div>
    </div>

    <header>
        <div class="brand">
            <div class="brand-logo">🤖</div>
            <div class="brand-name">AI Mobile</div>
        </div>
        <div class="status-dot" id="statusDot"></div>
    </header>

    <main id="chatArea">
        <div class="welcome" id="welcomeView">
            <div class="welcome-icon">✨</div>
            <h2>What's on your mind?</h2>
            <p>I'm your private local AI powered by Ollama.</p>
            <div class="chip-container">
                <div class="chip" onclick="sendPrompt('Tell me a fun fact')">Tell me a fun fact</div>
                <div class="chip" onclick="sendPrompt('Write a short story')">Write a short story</div>
                <div class="chip" onclick="sendPrompt('How can you help me?')">How can you help me?</div>
            </div>
        </div>
    </main>

    <div class="input-container">
        <div class="input-row">
            <textarea id="msgInput" placeholder="Type a message..." rows="1"></textarea>
            <button class="action-btn send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('chat')">
            <span class="nav-icon">💬</span>
            <span>Chat</span>
        </div>
        <div class="nav-item" onclick="switchTab('history')">
            <span class="nav-icon">📜</span>
            <span>History</span>
        </div>
        <div class="nav-item" onclick="showSettings()">
            <span class="nav-icon">⚙️</span>
            <span>Settings</span>
        </div>
    </nav>

    <!-- Settings Bottom Sheet -->
    <div class="bottom-sheet-overlay" id="sheetOverlay"></div>
    <div class="bottom-sheet" id="settingsSheet">
        <div class="handle"></div>
        <h3 style="margin-bottom: 1.5rem;">Settings</h3>

        <div style="display: flex; flex-direction: column; gap: 1.25rem;">
            <div>
                <label
                    style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">Ollama
                    Server URL</label>
                <input type="text" id="ollamaUrl" class="auth-input" style="margin-bottom:0">
            </div>

            <div>
                <label
                    style="display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem;">Model
                    Select</label>
                <select id="modelSelect" class="auth-input" style="margin-bottom:0">
                    <option value="llama3">llama3</option>
                    <option value="mistral">mistral</option>
                    <option value="llava">llava</option>
                </select>
            </div>

            <button class="auth-btn" onclick="saveSettings()" style="margin-top: 1rem;">Save Changes</button>
            <button class="auth-btn" onclick="logout()" style="background: #ef4444; margin-top: 0.5rem;">Logout</button>
        </div>
    </div>

    <!-- History Bottom Sheet -->
    <div class="bottom-sheet" id="historySheet">
        <div class="handle"></div>
        <h3 style="margin-bottom: 1.5rem;">Chat History</h3>
        <div id="historyList" style="display: flex; flex-direction: column; gap: 0.75rem;">
            <!-- History items will be injected here -->
        </div>
    </div>

    <script>
        // --- Core Essentials ---
        const OLLAMA_URL_KEY = 'ollama_url';
        const STORAGE_KEY = 'localai_sessions';
        const AUTH_KEY = 'localai_authenticated';
        const LAST_MODEL_KEY = 'localai_last_model';
        const DEFAULT_URL = 'https://09vq1p80-11434.uks1.devtunnels.ms';

        let sessions = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let activeId = null;
        let history = [];

        // --- Auth ---
        function checkAuth() {
            if (sessionStorage.getItem(AUTH_KEY)) {
                document.getElementById('authOverlay').style.display = 'none';
            }
        }

        document.getElementById('loginBtn').onclick = () => {
            const pass = document.getElementById('authPass').value;
            if (pass === '1976') {
                sessionStorage.setItem(AUTH_KEY, 'true');
                checkAuth();
            } else {
                document.getElementById('authError').style.display = 'block';
            }
        };

        function logout() {
            sessionStorage.removeItem(AUTH_KEY);
            location.reload();
        }

        // --- Settings ---
        function showSettings() {
            document.getElementById('sheetOverlay').classList.add('active');
            document.getElementById('settingsSheet').classList.add('active');
            document.getElementById('ollamaUrl').value = localStorage.getItem(OLLAMA_URL_KEY) || DEFAULT_URL;
        }

        function saveSettings() {
            localStorage.setItem(OLLAMA_URL_KEY, document.getElementById('ollamaUrl').value);
            closeSheets();
            checkConnection();
        }

        function closeSheets() {
            document.querySelectorAll('.bottom-sheet').forEach(s => s.classList.remove('active'));
            document.getElementById('sheetOverlay').classList.remove('active');
        }

        document.getElementById('sheetOverlay').onclick = closeSheets;

        // --- Chat Logic ---
        async function checkConnection() {
            const url = localStorage.getItem(OLLAMA_URL_KEY) || DEFAULT_URL;
            const dot = document.getElementById('statusDot');
            const modelSelect = document.getElementById('modelSelect');
            try {
                const res = await fetch(`${url}/api/tags`);
                if (res.ok) {
                    dot.className = 'status-dot online';
                    const data = await res.json();
                    if (data.models && data.models.length > 0) {
                        const current = modelSelect.value;
                        const lastGlobal = localStorage.getItem(LAST_MODEL_KEY);
                        modelSelect.innerHTML = '';
                        data.models.forEach(m => {
                            const opt = document.createElement('option');
                            opt.value = m.name;
                            opt.textContent = m.name;
                            if (m.name === current || m.name === lastGlobal) opt.selected = true;
                            modelSelect.appendChild(opt);
                        });
                    }
                } else {
                    dot.className = 'status-dot';
                }
            } catch {
                dot.className = 'status-dot';
            }
        }

        const msgInput = document.getElementById('msgInput');
        const chatArea = document.getElementById('chatArea');
        const modelSelect = document.getElementById('modelSelect');

        modelSelect.onchange = () => {
            localStorage.setItem(LAST_MODEL_KEY, modelSelect.value);
        };

        msgInput.oninput = () => {
            msgInput.style.height = 'auto';
            msgInput.style.height = msgInput.scrollHeight + 'px';
        };

        function addMessage(role, text) {
            const welcome = document.getElementById('welcomeView');
            if (welcome) welcome.style.display = 'none';
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${role}`;
            msgDiv.innerHTML = `
                <div class="bubble">${marked.parse(text)}</div>
                <div class="msg-info">${role === 'user' ? 'You' : 'AI'} • ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
            `;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            hljs.highlightAll();
        }

        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;

            msgInput.value = '';
            msgInput.style.height = 'auto';
            addMessage('user', text);
            history.push({ role: 'user', content: text });

            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = 'msg ai';
            aiMsgDiv.innerHTML = '<div class="bubble">...</div>';
            chatArea.appendChild(aiMsgDiv);
            const bubble = aiMsgDiv.querySelector('.bubble');

            const url = localStorage.getItem(OLLAMA_URL_KEY) || DEFAULT_URL;
            try {
                const response = await fetch(`${url}/api/chat`, {
                    method: 'POST',
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: history,
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                let fullText = '';
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = new TextDecoder().decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (!line) continue;
                        const json = JSON.parse(line);
                        if (json.message) {
                            fullText += json.message.content;
                            bubble.innerHTML = marked.parse(fullText);
                        }
                    }
                }
                history.push({ role: 'assistant', content: fullText });
                saveCurrentSession();
            } catch (e) {
                bubble.innerHTML = 'Error connecting to Ollama';
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;

        function sendPrompt(text) {
            msgInput.value = text;
            sendMessage();
        }

        function saveCurrentSession() {
            if (!activeId) activeId = Date.now().toString();
            const session = sessions.find(s => s.id === activeId);
            if (session) {
                session.messages = history;
            } else {
                sessions.unshift({
                    id: activeId,
                    name: history[0].content.substring(0, 30),
                    messages: history
                });
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if (tab === 'chat') {
                document.querySelector('.nav-item').classList.add('active');
                closeSheets();
            } else if (tab === 'history') {
                document.querySelectorAll('.nav-item')[1].classList.add('active');
                renderHistory();
                document.getElementById('sheetOverlay').classList.add('active');
                document.getElementById('historySheet').classList.add('active');
            }
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = sessions.map(s => `
                <div class="chip" style="width:100%; text-align:left; justify-content: flex-start;" onclick="loadSession('${s.id}')">
                    <div style="font-weight:600">${s.name}</div>
                    <div style="font-size:0.7rem; color:var(--text-muted)">${s.messages.length} messages</div>
                </div>
            `).join('');
        }

        function loadSession(id) {
            const session = sessions.find(s => s.id === id);
            if (!session) return;
            activeId = id;
            history = session.messages;
            chatArea.innerHTML = '';
            history.forEach(m => addMessage(m.role === 'assistant' ? 'ai' : 'user', m.content));
            closeSheets();
            switchTab('chat');
        }

        // Init
        checkAuth();
        checkConnection();
        setInterval(checkConnection, 10000);

    </script>
</body>

</html>
